<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLICK-SAVE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>CLICK-SAVE</h1>
        <p class="subtitle">Fast, simple, and high-quality video downloads.</p>

        <div class="input-group">
            <input type="text" id="url" placeholder="https://example.com/video">
            <button onclick="handleDownload()">
                <span>Download Video</span>
            </button>
        </div>

        <p id="result"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
